<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial Tracking System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BACKGROUND */
body{
  background:radial-gradient(circle at top,#0c2340,#071a33,#040712);
  color:#fff;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a);
  padding:20px;
  border-radius:20px;
  text-align:center;
  animation:float 4s ease-in-out infinite;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.main-logo{
  max-width:340px;
  width:100%;
  margin-bottom:8px;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.5));
}

.system-title{
  font-size:14px;
  letter-spacing:2px;
  font-weight:bold;
  text-shadow:0 0 10px rgba(255,255,255,.5);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.income{border-left:4px solid #00ff9d;}
.expense{border-left:4px solid #ff4d4d;}
.net{border-left:4px solid #ffb300;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* INPUT */
input,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0f2a52;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  font-weight:bold;
}

/* REPORT */
.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  min-height:150px;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
}

/* CHART */
.chart{
  margin-top:12px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}

@media(max-width:768px){
  .grid,.kpi,.report-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="main-logo">
  <div class="system-title">FINANCIAL TRACKING SYSTEM</div>
</div>

<!-- KPI -->
<div class="kpi">
  <div class="card income">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card expense">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card net">NET<br><b id="netTotal">₱0</b></div>
  <div class="card">ENTRIES<br><b id="entryTotal">0</b></div>
</div>

<!-- INPUT -->
<div class="grid">

<!-- INCOME -->
<div class="module">
<h3>INCOME</h3>

<select id="incomeType">
  <option selected disabled>Select Income Type / Service</option>

  <optgroup label="Event Types">
    <option>Corporate Event</option>
    <option>Wedding</option>
    <option>Birthday</option>
    <option>Concert</option>
    <option>School Event</option>
    <option>Community Event</option>
    <option>Equipment Rental</option>
  </optgroup>

  <optgroup label="PPRX Services">
    <option>LED Wall & Visual Display</option>
    <option>Roofing & Trusses Setup</option>
    <option>Stage & Production</option>
    <option>Band Equipment Rental</option>
    <option>Installation Services</option>
    <option>Teleprompter Services</option>
    <option>Photo & Video Coverage</option>
    <option>Live Feed & Streaming</option>
    <option>Animation & Photo/Video Editing</option>
    <option>Event Consultation</option>
    <option>Event Management</option>
    <option>Full Event Services</option>
  </optgroup>

  <option>Other Income</option>
</select>

<input id="incomeEvent" placeholder="Event / Client">
<input id="incomeAmount" type="number" placeholder="Amount">
<input id="incomeDate" type="date">

<button onclick="addIncome()">ADD INCOME</button>
</div>

<!-- EXPENSE -->
<div class="module">
<h3>EXPENSE</h3>

<select id="expenseType">
<option disabled selected>Select Expense</option>
<option>Fuel</option>
<option>Transport</option>
<option>Food</option>
<option>Salary</option>
<option>Rental</option>
<option>Repair</option>
<option>Office Supplies</option>
<option>Bills</option>
<option>Other</option>
</select>

<input id="expenseNotes" placeholder="Notes">
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseDate" type="date">

<button onclick="addExpense()">ADD EXPENSE</button>
</div>

</div>

<!-- REPORT -->
<div class="report-grid">
<div class="report-box"><h3>INCOME</h3><div id="incomeReport"></div></div>
<div class="report-box"><h3>EXPENSE</h3><div id="expenseReport"></div></div>
</div>

<!-- CHART -->
<div class="chart">
<canvas id="chartCanvas"></canvas>
</div>

<script>
let data=[];
let income=0, expense=0, chart;

/* ADD */
function addIncome(){
if(!incomeAmount.value) return;
data.push({
type:"Income",
category:incomeType.value,
event:incomeEvent.value,
amount:+incomeAmount.value,
date:incomeDate.value
});
reset();
update();
}

function addExpense(){
if(!expenseAmount.value) return;
data.push({
type:"Expense",
category:expenseType.value,
event:expenseNotes.value,
amount:+expenseAmount.value,
date:expenseDate.value
});
reset();
update();
}

function reset(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

/* UPDATE */
function update(){
income=0; expense=0;
incomeReport.innerHTML="";
expenseReport.innerHTML="";

data.forEach(d=>{
if(d.type==="Income"){
income+=d.amount;
incomeReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
if(d.type==="Expense"){
expense+=d.amount;
expenseReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
});

incomeTotal.innerText="₱"+income;
expenseTotal.innerText="₱"+expense;
netTotal.innerText="₱"+(income-expense);
entryTotal.innerText=data.length;

drawChart();
}

/* CHART */
function drawChart(){
if(chart) chart.destroy();
chart=new Chart(chartCanvas,{
type:"doughnut",
data:{
labels:["Income","Expense"],
datasets:[{data:[income,expense]}]
}
});
}
</script>

</body>
</html>
