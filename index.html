<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial System Pro</title>

<!-- EXCEL LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b1d3a;
  color:#fff;
  padding:20px;
}

/* =========================
   TOP KPI
========================= */
.kpi-top{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.kpi-card{
  flex:1;
  background:#142b52;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.kpi-card h3{
  font-size:12px;
  color:#cfe3ff;
}

.kpi-card h1{
  font-size:20px;
  margin-top:5px;
}

.income-top{ border-left:5px solid #00ff9d; }
.expense-top{ border-left:5px solid #ff4d4d; }
.net-top{ border-left:5px solid #ff9800; }

/* =========================
   MAIN
========================= */
.kpi{
  display:flex;
  gap:10px;
}

/* CARD */
.card{
  flex:1;
  background:#142b52;
  padding:15px;
  border-radius:10px;
}

/* LEFT */
.income{
  border-left:5px solid #00ff9d;
}

/* RIGHT */
.expense{
  border-left:5px solid #ff4d4d;
}

/* =========================
   BOX INPUT
========================= */
.box{
  background:#1a335f;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

input,select{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0f2346;
  color:#fff;
  outline:none;
}

/* =========================
   BUTTONS
========================= */
button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff9800;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   EVENTS LIST
========================= */
#events{
  margin-top:20px;
  display:grid;
  gap:10px;
}

.event-card{
  background:#142b52;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
}

/* =========================
   FILTER
========================= */
.filter{
  margin-top:15px;
  display:grid;
  gap:8px;
  background:#142b52;
  padding:10px;
  border-radius:10px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:600px){
  .kpi-top,
  .kpi{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<h2 style="text-align:center;">PPRX FINANCIAL SYSTEM PRO</h2>

<!-- KPI TOP -->
<div class="kpi-top">

  <div class="kpi-card income-top">
    <h3>Total Income</h3>
    <h1 id="totalIncome">₱0</h1>
  </div>

  <div class="kpi-card expense-top">
    <h3>Total Expenses</h3>
    <h1 id="totalExpense">₱0</h1>
  </div>

  <div class="kpi-card net-top">
    <h3>Net Income</h3>
    <h1 id="net">₱0</h1>
  </div>

</div>

<!-- FILTER + EXPORT -->
<div class="filter">

  <label>From</label>
  <input type="date" id="fromDate">

  <label>To</label>
  <input type="date" id="toDate">

  <button onclick="exportExcel()">EXPORT TO EXCEL</button>

</div>

<!-- MAIN -->
<div class="kpi">

  <!-- LEFT INCOME -->
  <div class="card income">

    <h3>Income Module</h3>

    <div class="box">
      <input id="event" placeholder="Event Name">
    </div>

    <div class="box">
      <label>Event Type</label>
      <select id="eventType">
        <option>Corporate Event</option>
        <option>Wedding</option>
        <option>Bday / Debut</option>
        <option>Exhibition & Trade Show</option>
        <option>Concert & Live Performance</option>
        <option>Equipment Rental</option>
      </select>
    </div>

    <div class="box">
      <input id="rate" type="number" placeholder="Rate">
    </div>

    <div class="box">
      <input type="date" id="date">
    </div>

    <button onclick="addIncome()">ADD INCOME</button>

  </div>

  <!-- RIGHT EXPENSE -->
  <div class="card expense">

    <h3>Expense Module</h3>

    <div class="box">
      <label>Category</label>
      <select id="expenseCategory">
        <option>Fuel</option>
        <option>Transport</option>
        <option>Food</option>
        <option>Allowance</option>
        <option>Rentals</option>
        <option>Utilities</option>
        <option>Water</option>
        <option>Electric</option>
        <option>Internet</option>
        <option>Permits</option>
        <option>Insurance</option>
      </select>
    </div>

    <div class="box">
      <input id="amount" type="number" placeholder="Amount">
    </div>

    <div class="box">
      <input type="date" id="dateExpense">
    </div>

    <button onclick="addExpense()">ADD EXPENSE</button>

  </div>

</div>

<!-- EVENTS -->
<div id="events"></div>

<script>

let data = [];
let income = 0;
let expense = 0;

/* =========================
   ADD INCOME
========================= */
function addIncome(){

  let e = document.getElementById("event").value;
  let t = document.getElementById("eventType").value;
  let r = parseFloat(document.getElementById("rate").value);
  let d = document.getElementById("date").value;

  if(!e || !r) return;

  data.push({
    type:"income",
    event:e,
    category:t,
    amount:r,
    date:d
  });

  update();
}

/* =========================
   ADD EXPENSE
========================= */
function addExpense(){

  let c = document.getElementById("expenseCategory").value;
  let a = parseFloat(document.getElementById("amount").value);
  let d = document.getElementById("dateExpense").value;

  if(!a) return;

  data.push({
    type:"expense",
    event:c,
    category:c,
    amount:a,
    date:d
  });

  update();
}

/* =========================
   FILTER
========================= */
function filterData(){

  let from = document.getElementById("fromDate").value;
  let to = document.getElementById("toDate").value;

  return data.filter(d=>{

    if(!d.date) return false;
    if(from && d.date < from) return false;
    if(to && d.date > to) return false;

    return true;
  });

}

/* =========================
   UPDATE UI
========================= */
function update(){

  let filtered = filterData();

  income = 0;
  expense = 0;

  let html = "";

  filtered.forEach(d=>{

    if(d.type=="income") income += d.amount;
    else expense += d.amount;

    html += `
      <div class="event-card">
        <b>${d.type.toUpperCase()}</b><br>
        ${d.event}<br>
        ₱${d.amount} <br>
        <small>${d.date || ""}</small>
      </div>
    `;

  });

  document.getElementById("totalIncome").innerText = "₱"+income;
  document.getElementById("totalExpense").innerText = "₱"+expense;
  document.getElementById("net").innerText = "₱"+(income-expense);

  document.getElementById("events").innerHTML = html;

}

/* =========================
   EXPORT EXCEL (RANGE)
========================= */
function exportExcel(){

  let rows = [["Type","Event","Category","Amount","Date"]];

  let filtered = filterData();

  filtered.forEach(d=>{
    rows.push([d.type,d.event,d.category,d.amount,d.date]);
  });

  let wb = XLSX.utils.book_new();
  let ws = XLSX.utils.aoa_to_sheet(rows);

  XLSX.utils.book_append_sheet(wb, ws, "PPRX Report");

  XLSX.writeFile(wb, "PPRX_Report.xlsx");
}

</script>

</body>
</html>
