<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PPRX Event Tracker</title>

<style>

/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0b1d3a;
  color:#fff;
  padding:20px;
}

/* =========================
   HEADER
========================= */
.top{
  text-align:center;
  margin-bottom:15px;
}

.logo{
  width:70px;
  height:70px;
  margin-bottom:8px;
}

/* =========================
   KPI (LEFT / RIGHT FIXED)
========================= */
.kpi{
  display:flex;
  gap:10px;
}

.card{
  flex:1;
  background:#142b52;
  padding:15px;
  border-radius:10px;
}

/* LEFT */
.income{
  border-left:5px solid #00ff9d;
}

/* RIGHT */
.expense{
  border-left:5px solid #ff4d4d;
}

/* NET */
.net{
  margin-top:10px;
  background:#102344;
  text-align:center;
  padding:15px;
  border-radius:10px;
}

/* =========================
   FORM
========================= */
.form{
  margin-top:20px;
  display:grid;
  gap:8px;
}

input,select,button{
  padding:10px;
  border:none;
  border-radius:8px;
}

input,select{
  background:#1a335f;
  color:#fff;
}

button{
  background:#ff9800;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   EVENT CARDS
========================= */
#eventList{
  margin-top:20px;
  display:grid;
  gap:10px;
}

.event-card{
  background:#142b52;
  padding:15px;
  border-radius:10px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="top">
  <img src="logo.png" class="logo">
  <h1>PPRX EVENT TRACKER</h1>
</div>

<!-- KPI -->
<div class="kpi">

  <div class="card income">
    <h3>Income</h3>
    <h1 id="income">₱0</h1>
  </div>

  <div class="card expense">
    <h3>Expenses</h3>
    <h1 id="expense">₱0</h1>
  </div>

</div>

<!-- NET -->
<div class="card net">
  <h3>Net Income</h3>
  <h1 id="net">₱0</h1>
</div>

<!-- FORM -->
<div class="form">

  <input id="event" placeholder="Event Name">
  <input id="desc" placeholder="Description">

  <select id="type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>

  <select id="category">
    <option>Event Income</option>
    <option>Rate per Event</option>
    <option>Transport</option>
    <option>Fuel</option>
    <option>Food</option>
    <option>Allowance</option>
    <option>Rentals</option>
    <option>Utilities</option>
    <option>Water</option>
    <option>Electric</option>
    <option>Telephone</option>
    <option>Miscellaneous</option>
    <option>Repairs</option>
    <option>Stocks</option>
    <option>Office Supplies</option>
    <option>Spare Parts</option>
    <option>Permits</option>
    <option>Insurance</option>
  </select>

  <input id="amount" type="number" placeholder="Amount">

  <button onclick="add()">ADD</button>

</div>

<!-- EVENTS -->
<div id="eventList"></div>

<script>

let data = JSON.parse(localStorage.getItem("pprx")) || [];

function add(){

  let event = document.getElementById("event").value;
  let d = document.getElementById("desc").value;
  let t = document.getElementById("type").value;
  let c = document.getElementById("category").value;
  let a = parseFloat(document.getElementById("amount").value);

  if(!event || !a) return;

  data.push({event,d,t,c,a});

  localStorage.setItem("pprx", JSON.stringify(data));

  render();
}

function render(){

  let income = 0;
  let expense = 0;

  let events = {};

  data.forEach(i=>{

    if(i.t === "income") income += i.a;
    else expense += i.a;

    if(!events[i.event]){
      events[i.event] = {income:0, expense:0};
    }

    if(i.t === "income"){
      events[i.event].income += i.a;
    }else{
      events[i.event].expense += i.a;
    }

  });

  document.getElementById("income").innerText = "₱"+income;
  document.getElementById("expense").innerText = "₱"+expense;
  document.getElementById("net").innerText = "₱"+(income-expense);

  let html = "";

  for(let key in events){

    let e = events[key];
    let profit = e.income - e.expense;

    html += `
      <div class="event-card">
        <h3>${key}</h3>
        <p>Income: ₱${e.income}</p>
        <p>Expenses: ₱${e.expense}</p>
        <h4>Profit: ₱${profit}</h4>
      </div>
    `;
  }

  document.getElementById("eventList").innerHTML = html;

}

render();

</script>

</body>
</html>
