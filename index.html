<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

/* =========================
   BASE
========================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:radial-gradient(circle at top,#0b1f3a,#071a33,#050814);
  color:#fff;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  padding:14px;
  border-radius:16px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;
  backdrop-filter:blur(10px);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* INPUT */
input,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0f2a52;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  font-weight:bold;
}

/* REPORT */
.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  min-height:160px;
}

/* ITEM */
.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  font-size:12px;
}

/* FILTER */
.filter{
  margin-top:10px;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  display:grid;
  gap:8px;
}

/* CHART */
.chart{
  margin-top:10px;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .grid,.report-grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">P</div>
  <div>PPRX Financial System</div>
</div>

<!-- KPI -->
<div class="kpi">
  <div class="card">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card">NET<br><b id="netTotal">₱0</b></div>
</div>

<!-- INPUT -->
<div class="grid">

  <!-- INCOME -->
  <div class="module">
    <h3>INCOME</h3>

    <select id="incomeType">
      <option selected disabled>Select Income Type</option>
      <option>Corporate Event</option>
      <option>Wedding</option>
      <option>Birthday</option>
      <option>Concert</option>
      <option>Equipment Rental</option>
    </select>

    <input id="incomeEvent" placeholder="Event Name">
    <input id="incomeAmount" type="number" placeholder="Amount">
    <input id="incomeDate" type="date">

    <button onclick="addIncome()">ADD INCOME</button>
  </div>

  <!-- EXPENSE -->
  <div class="module">
    <h3>EXPENSE</h3>

    <select id="expenseType">

      <option selected disabled>Select Expense Type</option>

      <optgroup label="🚗 Operations">
        <option>Fuel</option>
        <option>Transport</option>
        <option>Food</option>
        <option>Rentals</option>
        <option>Utilities</option>
        <option>Permits</option>
        <option>Insurance</option>
      </optgroup>

      <optgroup label="🛠 Maintenance">
        <option>Spare Parts</option>
        <option>Repairs & Preventive Maintenance</option>
      </optgroup>

      <optgroup label="🏢 Office">
        <option>Office Supplies</option>
        <option>Miscellaneous</option>
      </optgroup>

      <optgroup label="👥 Payroll">
        <option>Salary</option>
        <option>Allowances</option>
        <option>Compensations</option>
        <option>Benefits</option>
      </optgroup>

    </select>

    <input id="expenseNotes" placeholder="Notes">
    <input id="expenseAmount" type="number" placeholder="Amount">
    <input id="expenseDate" type="date">

    <button onclick="addExpense()">ADD EXPENSE</button>
  </div>

</div>

<!-- FILTER -->
<div class="filter">
  <input type="date" id="from">
  <input type="date" id="to">
  <input id="search" placeholder="Search Event">
  <button onclick="exportExcel()">EXPORT</button>
  <button onclick="clearAll()">CLEAR ALL</button>
</div>

<!-- REPORT -->
<div class="report-grid">

  <div class="report-box">
    <h3>INCOME</h3>
    <div id="incomeReport"></div>
  </div>

  <div class="report-box">
    <h3>EXPENSE</h3>
    <div id="expenseReport"></div>
  </div>

</div>

<!-- CHART -->
<div class="chart">
  <canvas id="chartCanvas"></canvas>
</div>

<script>

let data=[];
let income=0;
let expense=0;
let chart;

/* ADD INCOME */
function addIncome(){

  if(!incomeAmount.value || !incomeType.value) return;

  data.push({
    type:"Income",
    category:incomeType.value,
    event:incomeEvent.value,
    amount:+incomeAmount.value,
    date:incomeDate.value
  });

  incomeType.selectedIndex=0;
  incomeEvent.value="";
  incomeAmount.value="";
  incomeDate.value="";

  update();
}

/* ADD EXPENSE */
function addExpense(){

  if(!expenseAmount.value || !expenseType.value) return;

  data.push({
    type:"Expense",
    category:expenseType.value,
    event:expenseNotes.value || expenseType.value,
    amount:+expenseAmount.value,
    date:expenseDate.value
  });

  expenseType.selectedIndex=0;
  expenseNotes.value="";
  expenseAmount.value="";
  expenseDate.value="";

  update();
}

/* FILTER */
function filtered(){
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let search=document.getElementById("search").value.toLowerCase();

  return data.filter(d=>{
    if(from && d.date<from) return false;
    if(to && d.date>to) return false;
    if(search && !d.event.toLowerCase().includes(search)) return false;
    return true;
  });
}

/* UPDATE */
function update(){

  let list=filtered();

  income=0; expense=0;

  let incHTML="";
  let expHTML="";

  list.forEach(d=>{

    if(d.type==="Income"){
      income+=d.amount;
      incHTML+=`<div class="item">${d.category}<br>${d.event}<br>₱${d.amount}</div>`;
    }

    if(d.type==="Expense"){
      expense+=d.amount;
      expHTML+=`<div class="item">${d.category}<br>${d.event}<br>₱${d.amount}</div>`;
    }

  });

  incomeReport.innerHTML=incHTML;
  expenseReport.innerHTML=expHTML;

  incomeTotal.innerText="₱"+income;
  expenseTotal.innerText="₱"+expense;
  netTotal.innerText="₱"+(income-expense);

  drawChart();
}

/* CHART */
function drawChart(){

  if(chart) chart.destroy();

  chart=new Chart(chartCanvas,{
    type:"doughnut",
    data:{
      labels:["Income","Expense"],
      datasets:[{data:[income,expense]}]
    }
  });

}

/* CLEAR */
function clearAll(){
  data=[];
  update();
}

/* EXPORT */
function exportExcel(){
  let rows=[["Type","Category","Event","Amount","Date"]];
  filtered().forEach(d=>rows.push([d.type,d.category,d.event,d.amount,d.date]));

  let wb=XLSX.utils.book_new();
  let ws=XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb,ws,"Report");
  XLSX.writeFile(wb,"PPRX.xlsx");
}

update();

</script>

</body>
</html>
