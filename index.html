<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial Tracking System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(14,165,233,0.26), transparent 32%),
    radial-gradient(circle at top right, rgba(255,179,71,0.16), transparent 30%),
    radial-gradient(circle at top,#0c2340,#071a33,#040712);
  color:#fff;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a,#0ea5e9);
  background-size:400% 400%;
  animation:gradientMove 6s ease infinite;
  padding:14px 10px;
  border-radius:16px;
  min-height:170px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 14px 32px rgba(0,0,0,0.38);
}

.header::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-90%;
  width:55%;
  height:200%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
  transform:rotate(25deg);
  animation:shineMove 4s ease-in-out infinite;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  z-index:2;
}

.main-logo{
  display:block;
  width:100%;
  max-width:135px;
  margin:0;
  padding:0;
  filter:
    drop-shadow(0 8px 18px rgba(0,0,0,0.55))
    drop-shadow(0 0 12px rgba(255,255,255,0.16));
  animation:logoPulse 3s ease-in-out infinite;
}

.system-title{
  margin:0;
  padding:0;
  position:relative;
  top:-2px;
  font-size:12px;
  font-weight:900;
  letter-spacing:2px;
  line-height:1;
  color:#e0f2fe;
  text-transform:uppercase;
  text-shadow:
    0 0 6px rgba(255,255,255,0.45),
    0 0 14px rgba(56,189,248,0.55);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.income{border-left:4px solid #00ff9d}
.expense{border-left:4px solid #ff4d4d}
.net{border-left:4px solid #ffb300}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* INPUT */
input,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0f2a52;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  font-weight:bold;
  cursor:pointer;
}

.btn-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.btn-blue{background:linear-gradient(90deg,#38bdf8,#2563eb);color:#fff}
.btn-red{background:linear-gradient(90deg,#ef4444,#fb7185);color:#fff}
.btn-small{
  width:auto;
  padding:6px 10px;
  font-size:11px;
  margin-right:5px;
}

/* FILTER */
.filter{
  margin-top:12px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1.4fr;
  gap:8px;
}

/* REPORT */
.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  max-height:380px;
  overflow-y:auto;
}

.report-box::-webkit-scrollbar{width:8px}
.report-box::-webkit-scrollbar-thumb{background:rgba(255,179,71,.6);border-radius:20px}
.report-box::-webkit-scrollbar-track{background:rgba(255,255,255,.06)}

.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  line-height:1.5;
}

.item small{
  color:rgba(255,255,255,0.65);
}

/* CHART */
.chart{
  margin-top:12px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

.chart h3{
  margin-bottom:10px;
}

.chart-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.chart-box{
  min-height:280px;
  position:relative;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes shineMove{
  0%{left:-90%;opacity:0;}
  30%{opacity:1;}
  100%{left:140%;opacity:0;}
}

@keyframes logoPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

@media(max-width:768px){
  .grid,.kpi,.report-grid,.chart-grid,.filter,.btn-row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <img src="logo.png" class="main-logo" alt="PPRX Logo">
    <div class="system-title">FINANCIAL TRACKING SYSTEM</div>
  </div>
</div>

<div class="kpi">
  <div class="card income">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card expense">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card net">NET<br><b id="netTotal">₱0</b></div>
  <div class="card">ENTRIES<br><b id="entryTotal">0</b></div>
</div>

<div class="grid">

<div class="module">
<h3>INCOME</h3>

<select id="incomeType">
  <option value="" selected>Select Income Type / Service</option>

  <optgroup label="Event Types">
    <option>Corporate Event</option>
    <option>Wedding</option>
    <option>Birthday</option>
    <option>Concert</option>
    <option>School Event</option>
    <option>Community Event</option>
    <option>Equipment Rental</option>
  </optgroup>

  <optgroup label="PPRX Services">
    <option>LED Wall & Visual Display</option>
    <option>Roofing & Trusses Setup</option>
    <option>Stage & Production</option>
    <option>Band Equipment Rental</option>
    <option>Installation Services</option>
    <option>Teleprompter Services</option>
    <option>Photo & Video Coverage</option>
    <option>Live Feed & Streaming</option>
    <option>Animation & Photo/Video Editing</option>
    <option>Event Consultation</option>
    <option>Event Management</option>
    <option>Full Event Services</option>
  </optgroup>

  <option>Other Income</option>
</select>

<input id="incomeEvent" placeholder="Event / Client">
<input id="incomeAmount" type="number" placeholder="Amount">
<input id="incomeDate" type="date">

<button onclick="addIncome()" id="incomeBtn">ADD INCOME</button>
</div>

<div class="module">
<h3>EXPENSE</h3>

<select id="expenseType">
  <option value="" selected>Select Expense</option>
  <option>Diesel Fuel</option>
  <option>Transportation</option>
  <option>Food</option>
  <option>Salary</option>
  <option>Allowance</option>
  <option>Rental</option>
  <option>Repair & Maintenance</option>
  <option>Office Supplies</option>
  <option>Equipment Parts / Stocks</option>
  <option>Permits</option>
  <option>Water Bill</option>
  <option>Electric Bill</option>
  <option>Telephone / Internet</option>
  <option>Utilities</option>
  <option>Other</option>
</select>

<input id="expenseNotes" placeholder="Notes">
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseDate" type="date">

<button onclick="addExpense()" id="expenseBtn">ADD EXPENSE</button>
</div>

</div>

<div class="filter">
  <input type="date" id="filterFrom" onchange="update()">
  <input type="date" id="filterTo" onchange="update()">
  <select id="filterType" onchange="update()">
    <option value="">All Types</option>
    <option>Income</option>
    <option>Expense</option>
  </select>
  <input id="filterSearch" oninput="update()" placeholder="Search category, event, notes">
</div>

<div class="btn-row">
  <button class="btn-blue" onclick="exportExcel()">EXPORT TO EXCEL</button>
  <button class="btn-red" onclick="clearAll()">CLEAR ALL</button>
</div>

<div class="report-grid">
<div class="report-box"><h3>INCOME</h3><div id="incomeReport"></div></div>
<div class="report-box"><h3>EXPENSE</h3><div id="expenseReport"></div></div>
</div>

<div class="chart">
<h3>EXPENSE VS INCOME</h3>
<div class="chart-grid">
  <div class="chart-box">
    <canvas id="chartCanvas"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="categoryChartCanvas"></canvas>
  </div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("pprxData")) || [];
let income=0, expense=0, chart, categoryChart;
let editIndex = null;

function save(){
  localStorage.setItem("pprxData", JSON.stringify(data));
}

function today(){
  return new Date().toISOString().split("T")[0];
}

function addIncome(){
if(!incomeType.value || !incomeAmount.value) return;

let entry = {
  type:"Income",
  category:incomeType.value,
  event:incomeEvent.value,
  amount:+incomeAmount.value,
  date:incomeDate.value || today()
};

if(editIndex !== null){
  data[editIndex] = entry;
  editIndex = null;
  incomeBtn.innerText = "ADD INCOME";
}else{
  data.push(entry);
}

clearIncomeForm();
save();
update();
}

function addExpense(){
if(!expenseType.value || !expenseAmount.value) return;

let entry = {
  type:"Expense",
  category:expenseType.value,
  event:expenseNotes.value,
  amount:+expenseAmount.value,
  date:expenseDate.value || today()
};

if(editIndex !== null){
  data[editIndex] = entry;
  editIndex = null;
  expenseBtn.innerText = "ADD EXPENSE";
}else{
  data.push(entry);
}

clearExpenseForm();
save();
update();
}

function clearIncomeForm(){
incomeType.value="";
incomeEvent.value="";
incomeAmount.value="";
incomeDate.value="";
}

function clearExpenseForm(){
expenseType.value="";
expenseNotes.value="";
expenseAmount.value="";
expenseDate.value="";
}

function filteredData(){
let from = filterFrom.value;
let to = filterTo.value;
let type = filterType.value;
let search = filterSearch.value.toLowerCase();

return data
.map((d,i)=>({...d,index:i}))
.filter(d=>{
  if(from && d.date < from) return false;
  if(to && d.date > to) return false;
  if(type && d.type !== type) return false;

  let text = `${d.type} ${d.category} ${d.event} ${d.amount} ${d.date}`.toLowerCase();
  if(search && !text.includes(search)) return false;

  return true;
});
}

function update(){
income=0;expense=0;
incomeReport.innerHTML="";
expenseReport.innerHTML="";

let list = filteredData();

list.forEach(d=>{
let buttons = `
<button class="btn-small btn-blue" onclick="editItem(${d.index})">EDIT</button>
<button class="btn-small btn-red" onclick="deleteItem(${d.index})">DELETE</button>
`;

if(d.type==="Income"){
income+=d.amount;
incomeReport.innerHTML+=`
<div class="item">
<b>${d.category}</b><br>
${d.event || "No event/client"}<br>
₱${d.amount.toLocaleString()}<br>
<small>${d.date || ""}</small><br>
${buttons}
</div>`;
}

if(d.type==="Expense"){
expense+=d.amount;
expenseReport.innerHTML+=`
<div class="item">
<b>${d.category}</b><br>
${d.event || "No notes"}<br>
₱${d.amount.toLocaleString()}<br>
<small>${d.date || ""}</small><br>
${buttons}
</div>`;
}
});

if(!incomeReport.innerHTML) incomeReport.innerHTML=`<div class="item">No income record found.</div>`;
if(!expenseReport.innerHTML) expenseReport.innerHTML=`<div class="item">No expense record found.</div>`;

incomeTotal.innerText="₱"+income.toLocaleString();
expenseTotal.innerText="₱"+expense.toLocaleString();
netTotal.innerText="₱"+(income-expense).toLocaleString();
entryTotal.innerText=list.length;

drawChart();
drawCategoryChart();
}

function editItem(i){
let d = data[i];
editIndex = i;

if(d.type === "Income"){
  incomeType.value = d.category;
  incomeEvent.value = d.event;
  incomeAmount.value = d.amount;
  incomeDate.value = d.date;
  incomeBtn.innerText = "UPDATE INCOME";
  expenseBtn.innerText = "ADD EXPENSE";
}

if(d.type === "Expense"){
  expenseType.value = d.category;
  expenseNotes.value = d.event;
  expenseAmount.value = d.amount;
  expenseDate.value = d.date;
  expenseBtn.innerText = "UPDATE EXPENSE";
  incomeBtn.innerText = "ADD INCOME";
}

window.scrollTo({top:document.querySelector(".grid").offsetTop,behavior:"smooth"});
}

function deleteItem(i){
if(!confirm("Delete this entry?")) return;
data.splice(i,1);
save();
update();
}

function clearAll(){
if(!confirm("Clear all records?")) return;
data=[];
editIndex=null;
save();
update();
}

function exportExcel(){
let rows = [["Type","Category","Event / Notes","Amount","Date"]];

filteredData().forEach(d=>{
  rows.push([d.type,d.category,d.event || "",d.amount,d.date || ""]);
});

let wb = XLSX.utils.book_new();
let ws = XLSX.utils.aoa_to_sheet(rows);
XLSX.utils.book_append_sheet(wb,ws,"PPRX Report");
XLSX.writeFile(wb,"PPRX-Financial-Report.xlsx");
}

function drawChart(){
if(chart) chart.destroy();

chart=new Chart(chartCanvas,{
type:"doughnut",
data:{
labels:["Income","Expense"],
datasets:[{
data:[income,expense],
backgroundColor:["#00ff9d","#ff4d4d"],
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"70%",
plugins:{
legend:{labels:{color:"#fff"}},
title:{display:true,text:"Expense vs Income",color:"#fff"}
}
}
});
}

function drawCategoryChart(){
let expenseCategories={};

filteredData().forEach(d=>{
if(d.type==="Expense"){
if(!expenseCategories[d.category]) expenseCategories[d.category]=0;
expenseCategories[d.category]+=d.amount;
}
});

let labels=Object.keys(expenseCategories);
let values=Object.values(expenseCategories);

if(categoryChart) categoryChart.destroy();

categoryChart=new Chart(categoryChartCanvas,{
type:"doughnut",
data:{
labels:labels.length ? labels : ["No Expense Yet"],
datasets:[{
data:values.length ? values : [1],
backgroundColor:[
"#ff4d4d","#ff9800","#ffd54f","#00ff9d",
"#38bdf8","#a855f7","#f472b6","#94a3b8"
],
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:"65%",
plugins:{
legend:{labels:{color:"#fff"}},
title:{display:true,text:"Expense Category Breakdown",color:"#fff"}
}
}
});
}

update();
</script>

</body>
</html>
