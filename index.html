<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

/* =========================
   BASE
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#071a33;
  color:#fff;
  padding:12px;
}

/* =========================
   HEADER
========================= */
.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-weight:bold;
}

/* =========================
   KPI
========================= */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.income{border-left:4px solid #00ff9d;}
.expense{border-left:4px solid #ff4d4d;}
.net{border-left:4px solid #ffb300;}

/* =========================
   MAIN LEFT / RIGHT
========================= */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

/* =========================
   MODULE
========================= */
.module{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

input,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f2a52;
  color:#fff;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  font-weight:bold;
}

/* =========================
   FILTER
========================= */
.filter{
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:grid;
  gap:8px;
}

/* =========================
   LIST
========================= */
.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  margin-top:8px;
  font-size:12px;
}

/* =========================
   PROFIT
========================= */
.profit{
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* =========================
   CHART
========================= */
.chart{
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  PPRX FINANCIAL SYSTEM (LEFT / RIGHT FIXED)
</div>

<!-- KPI -->
<div class="kpi">

  <div class="card income">
    INCOME<br>
    <b id="incomeTotal">₱0</b>
  </div>

  <div class="card expense">
    EXPENSE<br>
    <b id="expenseTotal">₱0</b>
  </div>

  <div class="card net">
    NET<br>
    <b id="netTotal">₱0</b>
  </div>

</div>

<!-- LEFT / RIGHT MODULES -->
<div class="grid">

  <!-- LEFT: INCOME -->
  <div class="module income">

    <h3>INCOME</h3>

    <select id="incomeType">
      <option>Corporate Event</option>
      <option>Wedding</option>
      <option>Birthday</option>
      <option>Concert</option>
      <option>Equipment Rental</option>
    </select>

    <input id="incomeEvent" placeholder="Event Name">
    <input id="incomeAmount" type="number" placeholder="Amount">
    <input id="incomeDate" type="date">

    <button onclick="addIncome()">ADD INCOME</button>

  </div>

  <!-- RIGHT: EXPENSE -->
  <div class="module expense">

    <h3>EXPENSE</h3>

    <select id="expenseType">
      <option>Fuel</option>
      <option>Transport</option>
      <option>Food</option>
      <option>Allowance</option>
      <option>Rentals</option>
      <option>Utilities</option>
      <option>Permits</option>
      <option>Insurance</option>
    </select>

    <input id="expenseAmount" type="number" placeholder="Amount">
    <input id="expenseDate" type="date">

    <button onclick="addExpense()">ADD EXPENSE</button>

  </div>

</div>

<!-- FILTER -->
<div class="filter">

  <input type="date" id="from">
  <input type="date" id="to">
  <input id="search" placeholder="Search Event">

  <button onclick="exportExcel()">EXPORT EXCEL</button>
  <button onclick="clearAll()" style="background:#ff4d4d;">CLEAR ALL</button>

</div>

<!-- PROFIT -->
<div class="profit">
  <h3>PER EVENT PROFIT</h3>
  <div id="profitBox"></div>
</div>

<!-- REPORT -->
<div id="report"></div>

<!-- CHART -->
<div class="chart">
  <canvas id="chart"></canvas>
</div>

<script>

let data=[];
let income=0;
let expense=0;
let chart;

/* =========================
   ADD INCOME
========================= */
function addIncome(){

  data.push({
    type:"Income",
    category:document.getElementById("incomeType").value,
    event:document.getElementById("incomeEvent").value,
    amount:+document.getElementById("incomeAmount").value,
    date:document.getElementById("incomeDate").value
  });

  update();
}

/* =========================
   ADD EXPENSE
========================= */
function addExpense(){

  data.push({
    type:"Expense",
    category:document.getElementById("expenseType").value,
    event:document.getElementById("expenseType").value,
    amount:+document.getElementById("expenseAmount").value,
    date:document.getElementById("expenseDate").value
  });

  update();
}

/* =========================
   FILTER
========================= */
function filtered(){

  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let search=document.getElementById("search").value.toLowerCase();

  return data.filter(d=>{

    if(from && d.date<from) return false;
    if(to && d.date>to) return false;
    if(search && !d.event.toLowerCase().includes(search)) return false;

    return true;
  });

}

/* =========================
   UPDATE
========================= */
function update(){

  let list=filtered();

  income=0;
  expense=0;

  let html="";
  let profit={};

  list.forEach(d=>{

    if(d.type=="Income") income+=d.amount;
    else expense+=d.amount;

    if(!profit[d.event]) profit[d.event]={in:0,ex:0};

    if(d.type=="Income") profit[d.event].in+=d.amount;
    else profit[d.event].ex+=d.amount;

    html+=`
      <div class="item">
        <b>${d.type}</b><br>
        ${d.category} - ${d.event}<br>
        ₱${d.amount} | ${d.date}
      </div>
    `;

  });

  document.getElementById("report").innerHTML=html;

  document.getElementById("incomeTotal").innerText="₱"+income;
  document.getElementById("expenseTotal").innerText="₱"+expense;
  document.getElementById("netTotal").innerText="₱"+(income-expense);

  renderProfit(profit);
  drawChart();

}

/* =========================
   PROFIT
========================= */
function renderProfit(p){

  let html="";

  Object.keys(p).forEach(k=>{

    let profit=p[k].in-p[k].ex;

    html+=`
      <div class="item">
        <b>${k}</b><br>
        Profit: ₱${profit}
      </div>
    `;
  });

  document.getElementById("profitBox").innerHTML=html;

}

/* =========================
   CHART
========================= */
function drawChart(){

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:["Income","Expense"],
      datasets:[{data:[income,expense]}]
    }
  });

}

/* =========================
   CLEAR
========================= */
function clearAll(){
  data=[];
  update();
}

/* =========================
   EXPORT
========================= */
function exportExcel(){

  let rows=[["Type","Category","Event","Amount","Date"]];

  filtered().forEach(d=>{
    rows.push([d.type,d.category,d.event,d.amount,d.date]);
  });

  let wb=XLSX.utils.book_new();
  let ws=XLSX.utils.aoa_to_sheet(rows);

  XLSX.utils.book_append_sheet(wb,ws,"Report");

  XLSX.writeFile(wb,"PPRX.xlsx");

}

update();

</script>

</body>
</html>
