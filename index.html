<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial Tracking System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:radial-gradient(circle at top,#0c2340,#071a33,#040712);
  color:#fff;
  padding:12px;
}

/* HEADER - DARK GOLD PREMIUM */
.header{
  background:
    radial-gradient(circle at 22% 45%, rgba(255,170,0,.38), transparent 32%),
    radial-gradient(circle at 80% 20%, rgba(37,99,235,.28), transparent 35%),
    linear-gradient(135deg,#030712,#07111f,#0b1f3a);
  padding:16px 10px;
  border-radius:18px;
  min-height:180px;
  max-height:220px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,179,71,.22);
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.header::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-80%;
  width:60%;
  height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);
  transform:rotate(25deg);
  animation:shineMove 4s ease-in-out infinite;
}

.main-logo{
  width:100%;
  max-width:170px;
  height:auto;
  position:relative;
  z-index:1;
  margin-bottom:8px;
  filter:
    drop-shadow(0 10px 22px rgba(0,0,0,.65))
    drop-shadow(0 0 22px rgba(255,170,0,.35));
  animation:logoPulse 3s ease-in-out infinite;
}

.system-title{
  position:relative;
  z-index:1;
  color:#fff;
  font-size:12px;
  font-weight:800;
  letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,255,255,.45);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  padding:12px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.income{border-left:4px solid #00ff9d}
.expense{border-left:4px solid #ff4d4d}
.net{border-left:4px solid #ffb300}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  padding:12px;
  border-radius:14px;
}

input,select{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:#0f2a52;
  color:#fff;
  outline:none;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  color:#111;
  font-weight:bold;
  cursor:pointer;
}

.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box,.chart{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  padding:12px;
  border-radius:14px;
}

.item{
  background:rgba(255,255,255,.06);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  font-size:13px;
}

.chart{margin-top:12px}

@keyframes shineMove{
  0%{left:-80%;opacity:0}
  30%{opacity:1}
  100%{left:130%;opacity:0}
}

@keyframes logoPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}

@media(max-width:768px){
  .grid,.kpi,.report-grid{
    grid-template-columns:1fr;
  }

  .header{
    min-height:150px;
    max-height:185px;
  }

  .main-logo{
    max-width:145px;
  }

  .system-title{
    font-size:11px;
    letter-spacing:1.5px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="main-logo" alt="PPRX Logo">
  <div class="system-title">FINANCIAL TRACKING SYSTEM</div>
</div>

<div class="kpi">
  <div class="card income">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card expense">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card net">NET<br><b id="netTotal">₱0</b></div>
  <div class="card">ENTRIES<br><b id="entryTotal">0</b></div>
</div>

<div class="grid">

<div class="module">
<h3>INCOME</h3>

<select id="incomeType">
  <option value="" selected>Select Income Type / Service</option>

  <optgroup label="Event Types">
    <option>Corporate Event</option>
    <option>Wedding</option>
    <option>Birthday</option>
    <option>Concert</option>
    <option>School Event</option>
    <option>Community Event</option>
    <option>Equipment Rental</option>
  </optgroup>

  <optgroup label="PPRX Services">
    <option>LED Wall & Visual Display</option>
    <option>Roofing & Trusses Setup</option>
    <option>Stage & Production</option>
    <option>Band Equipment Rental</option>
    <option>Installation Services</option>
    <option>Teleprompter Services</option>
    <option>Photo & Video Coverage</option>
    <option>Live Feed & Streaming</option>
    <option>Animation & Photo/Video Editing</option>
    <option>Event Consultation</option>
    <option>Event Management</option>
    <option>Full Event Services</option>
  </optgroup>

  <option>Other Income</option>
</select>

<input id="incomeEvent" placeholder="Event / Client">
<input id="incomeAmount" type="number" placeholder="Amount">
<input id="incomeDate" type="date">

<button onclick="addIncome()">ADD INCOME</button>
</div>

<div class="module">
<h3>EXPENSE</h3>

<select id="expenseType">
  <option value="" selected>Select Expense</option>
  <option>Diesel Fuel</option>
  <option>Transportation</option>
  <option>Food</option>
  <option>Salary</option>
  <option>Allowance</option>
  <option>Rental</option>
  <option>Repair & Maintenance</option>
  <option>Office Supplies</option>
  <option>Equipment Parts / Stocks</option>
  <option>Permits</option>
  <option>Water Bill</option>
  <option>Electric Bill</option>
  <option>Telephone / Internet</option>
  <option>Other</option>
</select>

<input id="expenseNotes" placeholder="Notes / Related Event">
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseDate" type="date">

<button onclick="addExpense()">ADD EXPENSE</button>
</div>

</div>

<div class="report-grid">
  <div class="report-box">
    <h3>INCOME REPORT</h3>
    <div id="incomeReport"></div>
  </div>

  <div class="report-box">
    <h3>EXPENSE REPORT</h3>
    <div id="expenseReport"></div>
  </div>
</div>

<div class="chart">
  <canvas id="chartCanvas"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("pprxData")) || [];
let income = 0;
let expense = 0;
let chart;

function saveData(){
  localStorage.setItem("pprxData", JSON.stringify(data));
}

function addIncome(){
  if(!incomeType.value || !incomeAmount.value) return alert("Please complete income type and amount.");

  data.push({
    type:"Income",
    category:incomeType.value,
    event:incomeEvent.value || "No event/client",
    amount:+incomeAmount.value,
    date:incomeDate.value
  });

  clearInputs();
  saveData();
  update();
}

function addExpense(){
  if(!expenseType.value || !expenseAmount.value) return alert("Please complete expense type and amount.");

  data.push({
    type:"Expense",
    category:expenseType.value,
    event:expenseNotes.value || "No notes",
    amount:+expenseAmount.value,
    date:expenseDate.value
  });

  clearInputs();
  saveData();
  update();
}

function clearInputs(){
  document.querySelectorAll("input").forEach(input => input.value = "");
  incomeType.value = "";
  expenseType.value = "";
}

function update(){
  income = 0;
  expense = 0;
  incomeReport.innerHTML = "";
  expenseReport.innerHTML = "";

  data.forEach(d=>{
    if(d.type === "Income"){
      income += d.amount;
      incomeReport.innerHTML += `
        <div class="item">
          <b>${d.category}</b><br>
          ${d.event}<br>
          ₱${d.amount.toLocaleString()}<br>
          ${d.date || ""}
        </div>`;
    }

    if(d.type === "Expense"){
      expense += d.amount;
      expenseReport.innerHTML += `
        <div class="item">
          <b>${d.category}</b><br>
          ${d.event}<br>
          ₱${d.amount.toLocaleString()}<br>
          ${d.date || ""}
        </div>`;
    }
  });

  incomeTotal.innerText = "₱" + income.toLocaleString();
  expenseTotal.innerText = "₱" + expense.toLocaleString();
  netTotal.innerText = "₱" + (income - expense).toLocaleString();
  entryTotal.innerText = data.length;

  drawChart();
}

function drawChart(){
  if(chart) chart.destroy();

  chart = new Chart(chartCanvas,{
    type:"doughnut",
    data:{
      labels:["Income","Expense"],
      datasets:[{
        data:[income,expense],
        backgroundColor:["#00ff9d","#ff4d4d"]
      }]
    },
    options:{
      plugins:{
        legend:{
          labels:{color:"#fff"}
        }
      }
    }
  });
}

update();
</script>

</body>
</html>
