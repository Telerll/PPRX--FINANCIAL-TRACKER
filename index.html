<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial Tracking System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(14,165,233,0.26), transparent 32%),
    radial-gradient(circle at top right, rgba(255,179,71,0.16), transparent 30%),
    radial-gradient(circle at top,#0c2340,#071a33,#040712);
  color:#fff;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a,#0ea5e9);
  background-size:400% 400%;
  animation:gradientMove 6s ease infinite;

  padding:14px 10px;
  border-radius:16px;

  min-height:170px;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;
  overflow:hidden;

  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 14px 32px rgba(0,0,0,0.38);
}

/* SHINE */
.header::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-90%;
  width:55%;
  height:200%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
  transform:rotate(25deg);
  animation:shineMove 4s ease-in-out infinite;
}

/* BRAND (FIXED SPACING) */
.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  z-index:2;
}

/* LOGO */
.main-logo{
  display:block;
  width:100%;
  max-width:135px;
  margin:0;
  padding:0;

  filter:
    drop-shadow(0 8px 18px rgba(0,0,0,0.55))
    drop-shadow(0 0 12px rgba(255,255,255,0.16));

  animation:logoPulse 3s ease-in-out infinite;
}

/* TEXT */
.system-title{
  margin:0;
  padding:0;
  position:relative;
  top:-2px;

  font-size:12px;
  font-weight:900;
  letter-spacing:2px;
  line-height:1;

  color:#e0f2fe;
  text-transform:uppercase;

  text-shadow:
    0 0 6px rgba(255,255,255,0.45),
    0 0 14px rgba(56,189,248,0.55);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.income{border-left:4px solid #00ff9d}
.expense{border-left:4px solid #ff4d4d}
.net{border-left:4px solid #ffb300}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* INPUT */
input,select{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0f2a52;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  font-weight:bold;
}

/* REPORT */
.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
}

/* CHART */
.chart{
  margin-top:12px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* ANIMATION */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes shineMove{
  0%{left:-90%;opacity:0;}
  30%{opacity:1;}
  100%{left:140%;opacity:0;}
}

@keyframes logoPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

/* MOBILE */
@media(max-width:768px){
  .grid,.kpi,.report-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <img src="logo.png" class="main-logo" alt="PPRX Logo">
    <div class="system-title">FINANCIAL TRACKING SYSTEM</div>
  </div>
</div>

<div class="kpi">
  <div class="card income">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card expense">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card net">NET<br><b id="netTotal">₱0</b></div>
  <div class="card">ENTRIES<br><b id="entryTotal">0</b></div>
</div>

<div class="grid">

<div class="module">
<h3>INCOME</h3>

<select id="incomeType">
  <option value="" selected>Select Income Type / Service</option>

  <optgroup label="Event Types">
    <option>Corporate Event</option>
    <option>Wedding</option>
    <option>Birthday</option>
    <option>Concert</option>
    <option>School Event</option>
    <option>Community Event</option>
    <option>Equipment Rental</option>
  </optgroup>

  <optgroup label="PPRX Services">
    <option>LED Wall & Visual Display</option>
    <option>Roofing & Trusses Setup</option>
    <option>Stage & Production</option>
    <option>Band Equipment Rental</option>
    <option>Installation Services</option>
    <option>Teleprompter Services</option>
    <option>Photo & Video Coverage</option>
    <option>Live Feed & Streaming</option>
    <option>Animation & Photo/Video Editing</option>
    <option>Event Consultation</option>
    <option>Event Management</option>
    <option>Full Event Services</option>
  </optgroup>

  <option>Other Income</option>
</select>

<input id="incomeEvent" placeholder="Event / Client">
<input id="incomeAmount" type="number" placeholder="Amount">

<button onclick="addIncome()">ADD INCOME</button>
</div>

<div class="module">
<h3>EXPENSE</h3>

<select id="expenseType">
  <option value="" selected>Select Expense</option>

  <option>Diesel Fuel</option>
  <option>Transportation</option>
  <option>Food</option>
  <option>Salary</option>
  <option>Allowance</option>
  <option>Rental</option>
  <option>Repair & Maintenance</option>
  <option>Office Supplies</option>
  <option>Equipment Parts / Stocks</option>
  <option>Permits</option>
  <option>Water Bill</option>
  <option>Electric Bill</option>
  <option>Telephone / Internet</option>
  <option>Utilities</option>
  <option>Other</option>
</select>

<input id="expenseNotes" placeholder="Notes">
<input id="expenseAmount" type="number">

<button onclick="addExpense()">ADD EXPENSE</button>
</div>

</div>

<div class="report-grid">
<div class="report-box"><h3>INCOME</h3><div id="incomeReport"></div></div>
<div class="report-box"><h3>EXPENSE</h3><div id="expenseReport"></div></div>
</div>

<div class="chart">
<canvas id="chartCanvas"></canvas>
</div>

<script>
let data=[], income=0, expense=0, chart;

function addIncome(){
if(!incomeAmount.value) return;
data.push({type:"Income",category:incomeType.value,amount:+incomeAmount.value});
update();
}

function addExpense(){
if(!expenseAmount.value) return;
data.push({type:"Expense",category:expenseType.value,amount:+expenseAmount.value});
update();
}

function update(){
income=0;expense=0;
incomeReport.innerHTML="";
expenseReport.innerHTML="";

data.forEach(d=>{
if(d.type==="Income"){
income+=d.amount;
incomeReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
if(d.type==="Expense"){
expense+=d.amount;
expenseReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
});

incomeTotal.innerText="₱"+income;
expenseTotal.innerText="₱"+expense;
netTotal.innerText="₱"+(income-expense);
entryTotal.innerText=data.length;

drawChart();
}

function drawChart(){
if(chart) chart.destroy();
chart=new Chart(chartCanvas,{
type:"doughnut",
data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}
});
}
</script>

</body>
</html>
